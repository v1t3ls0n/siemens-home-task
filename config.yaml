# ---------------------------------------------------------------------------
# Model routing — the cost-optimization heart of the system.
#
# Each pipeline stage declares a TIER, not a model. Tiers map to a primary
# model + ordered fallbacks. Format: "<provider>:<model>", providers:
#   openai   — via OpenAI Responses API (automatic prompt caching >1k tokens)
#   anthropic— via LiteLLM
#   ollama   — LOCAL model via Ollama (zero cost; needs `ollama serve`)
#
# Routing rationale (defaults below):
#   light = page reading / extraction / summarization -> cheap model
#   heavy = final comparison, scoring, justification  -> strong model
# ---------------------------------------------------------------------------
routing:
  light:
    primary: "openai:gpt-5-mini"
    fallbacks: ["anthropic:claude-haiku-4-5", "ollama:qwen2.5:7b"]
  heavy:
    primary: "openai:gpt-5.1"
    fallbacks: ["anthropic:claude-sonnet-5", "openai:gpt-5-mini"]

# Set `provider: ollama` + model nomic-embed-text (dim 768) for a fully local,
# zero-cost embedding path. NOTE: changing dim requires re-creating indices
# (delete the OpenSearch index / .localstore file, then re-run seeding).
embeddings:
  provider: openai
  model: text-embedding-3-small
  dim: 1536

# USD per 1M tokens — edit to current price sheets. Used for the /api/usage
# cost report. Unknown models count as 0 (e.g. local ollama).
prices:
  "gpt-5.1":            {input: 1.25, output: 10.0}
  "gpt-5-mini":         {input: 0.25, output: 2.0}
  "claude-sonnet-5":    {input: 3.0,  output: 15.0}
  "claude-haiku-4-5":   {input: 1.0,  output: 5.0}
  "text-embedding-3-small": {input: 0.02, output: 0.0}

crawler:
  max_pages: 6
  page_char_limit: 12000
  delay_seconds: 0.5

search:
  backend: opensearch      # opensearch | local  (local = numpy fallback store)
  index: partner-scout-docs
